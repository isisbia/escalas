<!doctype html>
<!-- 
  PROJETO: Escala de Extração - Citroescala
  DESENVOLVEDOR: isisb
  VERSÃO: 1.18
-->
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="author" content="isisb">
  <title>Escala Extração</title>
  
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#10b981">
  <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/1570/1570887.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/themes/dark.css">
  <link rel="stylesheet" href="style.css?v=1.18">
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/pt.js"></script>
  
  <script>
    // FUNÇÃO DE MENU INSTANTÂNEA
    function toggleMenu() {
      const nav = document.getElementById('mainNav');
      const btn = document.getElementById('menuBtn');
      if (!nav || !btn) return;
      
      const isOpen = nav.classList.contains('open');
      if (!isOpen) {
        nav.classList.add('open');
        btn.classList.add('open');
        document.body.style.overflow = 'hidden';
      } else {
        nav.classList.remove('open');
        btn.classList.remove('open');
        document.body.style.overflow = '';
      }
    }
    // Expor globalmente para garantir
    window.toggleMenu = toggleMenu;
  </script>

  <script type="module" src="main.js?v=1.18"></script>
</head>
<body>

  <div id="toast-container"></div>

  <!-- Modal Confirm -->
  <div id="modalConfirm" class="modal-backdrop fixed inset-0">
    <div class="glass confirm-card bg-[#0f172a] p-8 rounded-[2.5rem] w-full max-w-sm border border-white/10 shadow-2xl text-center">
      <div id="confirmIcon" class="w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-6 border text-2xl"></div>
      <h3 id="confirmTitle" class="text-white font-black mb-3 text-xl uppercase italic tracking-tight"></h3>
      <p id="confirmText" class="text-gray-400 text-sm mb-10 leading-relaxed"></p>
      <div class="flex gap-3">
        <button id="btnConfirmCancel" class="flex-1 py-4 bg-white/5 rounded-2xl text-[10px] font-black uppercase tracking-widest hover:bg-white/10 transition-all">CANCELAR</button>
        <button id="btnConfirmOk" class="flex-1 py-4 bg-red-600 hover:bg-red-700 rounded-2xl text-[10px] font-black uppercase tracking-widest shadow-lg shadow-red-600/20 transition-all text-white">CONFIRMAR</button>
      </div>
    </div>
  </div>

  <header class="p-4 bg-gray-900/50 backdrop-blur-md border-b border-white/5 flex justify-between items-center sticky top-0 z-50">
    <div onclick="showSection('cadastro')" class="flex items-center gap-3 cursor-pointer group">
      <div class="w-10 h-10 bg-emerald-500 rounded-xl flex items-center justify-center shadow-lg shadow-emerald-500/20 group-hover:scale-105 transition-all">
        <span class="text-white font-black text-sm">E</span>
      </div>
      <div>
        <h1 class="font-extrabold text-lg tracking-tight text-white leading-none group-hover:text-emerald-400 transition-colors">ESCALA <span class="text-emerald-500 font-light">EXTRAÇÃO</span></h1>
        <p class="text-[10px] text-gray-500 font-bold tracking-[0.2em] uppercase">Setor de Operações</p>
      </div>
    </div>
    <div class="flex items-center gap-4 sm:gap-8 mr-2">
      <!-- Hamburger Button -->
      <button onclick="toggleMenu()" class="sm:hidden w-10 h-10 flex flex-col items-center justify-center gap-1.5 z-[110] relative" id="menuBtn">
        <span class="w-6 h-0.5 bg-white transition-all duration-300 origin-center"></span>
        <span class="w-6 h-0.5 bg-white transition-all duration-300"></span>
        <span class="w-6 h-0.5 bg-white transition-all duration-300 origin-center"></span>
      </button>

      <nav id="mainNav" class="nav-container">
        <button onclick="showSection('cadastro')" id="nav-cadastro" class="nav-btn active">Equipe</button>
        <button onclick="showSection('hoje')" id="nav-hoje" class="nav-btn">Folgas</button>
        <button onclick="showSection('janta')" id="nav-janta" class="nav-btn">Janta</button>
        <button onclick="showSection('relatorio')" id="nav-relatorio" class="nav-btn">Relatório</button>
      </nav>
    </div>
  </header>

  <main class="max-w-6xl mx-auto p-4 sm:p-6">
    <div id="shared-date-picker" class="hidden glass p-6 sm:p-10 rounded-3xl sm:rounded-[3rem] border border-white/5 shadow-2xl relative overflow-hidden mb-6">
      <div class="flex justify-center items-center gap-4 sm:gap-12 relative">
          <button onclick="changeDate(-1)" class="w-10 h-10 sm:w-14 bg-white/5 border border-white/5 rounded-xl hover:bg-emerald-500 transition-all text-white flex items-center justify-center">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 sm:h-6 sm:w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7" /></svg>
          </button>
          <div class="space-y-1">
            <p class="text-[9px] sm:text-[10px] font-black text-emerald-500 uppercase tracking-[0.3em]">Consulta</p>
            <input type="text" id="viewerDate" class="text-xl sm:text-3xl font-black bg-transparent border-none text-center text-white cursor-pointer hover:text-emerald-400 transition-colors !p-0">
          </div>
          <button onclick="changeDate(1)" class="w-10 h-10 sm:w-14 bg-white/5 border border-white/5 rounded-xl hover:bg-emerald-500 transition-all text-white flex items-center justify-center">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 sm:h-6 sm:w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 5l7 7-7 7" /></svg>
          </button>
      </div>
    </div>

    <section id="section-cadastro" class="space-y-6">
      <div class="glass p-8 rounded-[2rem] border border-white/5 shadow-2xl relative overflow-hidden">
        <div class="absolute top-0 left-0 w-1 bg-emerald-500 h-full"></div>
        <h2 class="text-emerald-400 font-extrabold uppercase text-[10px] tracking-[0.2em] mb-8 flex items-center gap-2">
          <span class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></span>
          Novo Cadastro de Funcionário
        </h2>
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 mb-8">
            <div class="flex flex-col gap-3">
              <label class="text-[10px] font-bold text-gray-500 uppercase ml-1 tracking-widest">Nome do Colaborador</label>
              <input type="text" id="inputNome" placeholder="Ex: JOÃO DA SILVA">
            </div>
            <div class="flex flex-col gap-3">
              <label class="text-[10px] font-bold text-gray-500 uppercase ml-1 tracking-widest">Data de Admissão</label>
              <input type="text" id="inputAdmissao" placeholder="Selecione a data">
            </div>
            <div class="flex flex-col gap-3">
              <label class="text-[10px] font-bold text-gray-500 uppercase ml-1 tracking-widest">Letra da Escala</label>
              <select id="selectLetra">
                <option value="A">Letra A</option><option value="B">Letra B</option><option value="C">Letra C</option>
                <option value="D">Letra D</option><option value="E">Letra E</option><option value="F">Letra F</option>
              </select>
            </div>
        </div>
        <div class="mb-10">
          <label class="text-[10px] text-gray-500 uppercase font-bold mb-4 block ml-2">Cargos / Funções Habilitadas:</label>
          <div id="cargoContainer" class="flex flex-wrap gap-3"></div>
        </div>
        <button onclick="addPessoa()" class="btn-primary px-12 py-4 rounded-2xl font-bold text-xs uppercase tracking-widest shadow-xl flex items-center justify-center gap-2">
          <span>Salvar na Nuvem</span>
          <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7" /></svg>
        </button>
      </div>

      <div class="glass rounded-3xl sm:rounded-[2rem] overflow-hidden border border-white/5 shadow-xl">
        <div class="p-4 sm:p-5 bg-white/[0.02] border-b border-white/5 flex justify-between items-center">
          <span class="text-[9px] sm:text-[10px] font-bold uppercase text-gray-400 tracking-[0.2em]">Equipe Ativa</span>
          <div class="flex items-center gap-2">
            <span id="countEquipe" class="bg-emerald-500/10 text-emerald-500 border border-emerald-500/20 px-3 sm:px-4 py-1 rounded-full text-[10px] font-black">0</span>
          </div>
        </div>
        <!-- Lista de Funcionários -->
        <div id="listaPessoas" class="divide-y divide-white/[0.03]"></div>
      </div>
    </section>

    <section id="section-hoje" class="hidden space-y-6 sm:space-y-8 text-center">
      <div class="glass p-6 sm:p-10 rounded-3xl sm:rounded-[3rem] border border-white/5 shadow-2xl relative overflow-hidden">
        <div id="resultadoFolga"></div>
      </div>
    </section>

    <section id="section-janta" class="hidden space-y-6 sm:space-y-8 text-center">
      <div class="glass p-6 sm:p-10 rounded-3xl sm:rounded-[3rem] border border-white/5 shadow-2xl relative overflow-hidden">
        <div id="resultadoJanta"></div>
      </div>
    </section>

    <section id="section-relatorio" class="hidden space-y-4">
      <div class="glass p-5 sm:p-8 rounded-3xl border border-white/5 shadow-xl">
        <h2 class="text-secondary font-black uppercase text-[10px] tracking-[0.2em] italic mb-8 flex items-center gap-2">
          <span class="w-2 h-2 bg-secondary rounded-full"></span>
          Histórico de Ausências
        </h2>
        <!-- Lista de Faltas -->
        <div id="corpoRelatorio" class="divide-y divide-white/[0.03]"></div>
      </div>
    </section>
  </main>

  <!-- Modal Edit -->
  <div id="modalEdit" class="modal-backdrop fixed inset-0">
    <div class="glass bg-[#0f172a] p-10 rounded-[2.5rem] w-full max-w-lg border border-white/10 shadow-2xl">
      <h3 class="text-2xl font-black text-emerald-400 mb-8 uppercase italic tracking-tight">Editar Funcionário</h3>
      <input type="hidden" id="editId">
      <div class="grid gap-6 mb-8">
        <div class="flex flex-col gap-2">
          <label class="text-[10px] font-bold text-gray-500 uppercase ml-1">Nome Completo</label>
          <input type="text" id="editNome" placeholder="Nome">
        </div>
        <div class="grid grid-cols-2 gap-4">
          <div class="flex flex-col gap-2">
            <label class="text-[10px] font-bold text-gray-500 uppercase ml-1">Admissão</label>
            <input type="text" id="editAdmissao" placeholder="Data">
          </div>
          <div class="flex flex-col gap-2">
            <label class="text-[10px] font-bold text-gray-500 uppercase ml-1">Letra</label>
            <select id="editLetra">
                <option value="A">A</option><option value="B">B</option><option value="C">C</option>
                <option value="D">D</option><option value="E">E</option><option value="F">F</option>
            </select>
          </div>
        </div>
      </div>
      <div class="mb-8">
        <label class="text-[10px] text-gray-500 uppercase font-bold mb-4 block ml-1">Cargos Habilitados:</label>
        <div id="editCargoContainer" class="flex flex-wrap gap-2"></div>
      </div>
      <div class="flex gap-4">
        <button onclick="closeEdit()" class="flex-1 py-4 bg-white/5 rounded-2xl font-bold uppercase text-[11px] hover:bg-white/10 transition-all">CANCELAR</button>
        <button onclick="updatePessoa()" class="flex-1 py-4 btn-primary rounded-2xl font-black uppercase text-[11px] tracking-widest">SALVAR</button>
      </div>
    </div>
  </div>

  <!-- Modal Falta -->
  <div id="modalFalta" class="modal-backdrop fixed inset-0">
    <div class="glass bg-[#0f172a] p-8 rounded-[2.5rem] w-full max-w-sm border border-red-500/20 text-center shadow-2xl">
      <div class="w-16 h-16 bg-red-500/10 rounded-full flex items-center justify-center mx-auto mb-6 border border-red-500/20 text-2xl">🚨</div>
      <h3 class="text-red-500 font-black mb-2 uppercase italic text-xl">Lançar Falta</h3>
      <p id="faltaNome" class="text-white/60 mb-8 text-xs uppercase tracking-widest"></p>
      <input type="hidden" id="faltaId">
      <div class="space-y-5">
          <div class="flex flex-col gap-2 text-left">
            <label class="text-[10px] font-bold text-gray-500 uppercase ml-1">Data da Ausência</label>
            <input type="text" id="dataFalta" placeholder="Selecione a data">
          </div>
          <div class="flex flex-col gap-2 text-left">
            <label class="text-[10px] font-bold text-gray-500 uppercase ml-1">Justificativa</label>
            <select id="atestadoFalta">
              <option value="Não">Falta sem Atestado</option>
              <option value="Sim">Com Atestado / Justificada</option>
            </select>
          </div>
      </div>
      <div class="flex gap-3 mt-10">
        <button onclick="fecharModalFalta()" class="flex-1 py-4 bg-white/5 rounded-2xl text-[10px] font-black uppercase tracking-widest">VOLTAR</button>
        <button onclick="salvarFalta()" class="flex-1 py-4 bg-red-600 rounded-2xl text-[10px] font-black uppercase tracking-widest">CONFIRMAR</button>
      </div>
    </div>
  </div>
</body>
</html>
